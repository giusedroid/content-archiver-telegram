services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: content-archiver-telegram:local
    env_file:
      - path: .env
        required: false
    environment:
      CONTENT_REPO_PATH: /workspace/content-repo
      TELEGRAM_DOWNLOAD_DIR: /app/.content-archiver-telegram/downloads
      KIRO_CLI: kiro-cli
    volumes:
      - type: bind
        source: ${CONTENT_REPO_HOST_PATH:-../content-archive-repo}
        target: /workspace/content-repo
      - type: bind
        source: ${AWS_CONFIG_HOST_PATH:-./.docker/aws-empty}
        target: /root/.aws
        read_only: true
      - telegram-downloads:/app/.content-archiver-telegram
    restart: unless-stopped

volumes:
  telegram-downloads:
